name: Build SimpleCam APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # кнопка "Run workflow" в интерфейсе GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Устанавливает Android SDK (API 34, build-tools 34.0.0)
      - uses: android-actions/setup-android@v3

      # Ставит Gradle 8.6 напрямую — gradle-wrapper.jar в репо не нужен
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Build APK
        run: gradle assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # Артефакт: Actions → выбрать запуск → Artifacts → скачать → поставить на телефон
      - uses: actions/upload-artifact@v4
        with:
          name: SimpleCam.apk
          path: app/build/outputs/apk/debug/app-debug.apk
